<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talion Crisis Comm - Console Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1923;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }
    .brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .brand-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1e3a5f, #3b82f6);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 28px;
      color: #fff;
      margin-bottom: 16px;
    }
    .brand h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #fff;
    }
    .brand p {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
    }
    .login-card {
      background: #1a2736;
      border-radius: 16px;
      border: 1px solid #2d3d4f;
      padding: 32px;
    }
    .login-card h2 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .login-card .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 6px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 14px;
      background: #0f1923;
      border: 1px solid #2d3d4f;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .form-group input::placeholder {
      color: #475569;
    }
    .form-group select option {
      background: #1a2736;
      color: #e2e8f0;
    }
    .role-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .role-card {
      padding: 16px 12px;
      background: #0f1923;
      border: 2px solid #2d3d4f;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .role-card:hover {
      border-color: #3b82f6;
    }
    .role-card.selected {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }
    .role-card .role-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .role-card .role-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    .role-card .role-desc {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #1e3a5f;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-login:hover {
      background: #2d4a6f;
    }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #475569;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2d3d4f;
    }
    .quick-access {
      display: flex;
      gap: 8px;
    }
    .quick-btn {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: 1px solid #2d3d4f;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .quick-btn:hover {
      border-color: #3b82f6;
      color: #e2e8f0;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="brand">
      <div class="brand-icon">T</div>
      <h1>TALION</h1>
      <p>Crisis Communication Platform</p>
    </div>

    <div class="login-card">
      <h2>Console Access</h2>
      <p class="subtitle">Select your role to access the appropriate console.</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your.email@talion.io" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>

      <div class="form-group">
        <label>Console</label>
      </div>
      <div class="role-cards">
        <div class="role-card" data-role="admin" onclick="selectRole('admin')">
          <div class="role-icon">&#x1F6E1;</div>
          <div class="role-name">Admin</div>
          <div class="role-desc">User & system management</div>
        </div>
        <div class="role-card" data-role="dispatcher" onclick="selectRole('dispatcher')">
          <div class="role-icon">&#x1F4E1;</div>
          <div class="role-name">Dispatch</div>
          <div class="role-desc">Incident & unit control</div>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()" disabled>Sign In</button>

      <div class="divider">or quick access</div>

      <div class="quick-access">
        <button class="quick-btn" onclick="quickAccess('admin')">&#x1F6E1; Admin Console</button>
        <button class="quick-btn" onclick="quickAccess('dispatcher')">&#x1F4E1; Dispatch Console</button>
      </div>
    </div>

    <div class="footer">
      Talion Crisis Comm &copy; 2026 &mdash; Secure Access
    </div>
  </div>

  <script>
    let selectedRole = null;

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`.role-card[data-role="${role}"]`).classList.add('selected');
      updateLoginBtn();
    }

    function updateLoginBtn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      document.getElementById('loginBtn').disabled = !(email && password && selectedRole);
    }

    document.getElementById('email').addEventListener('input', updateLoginBtn);
    document.getElementById('password').addEventListener('input', updateLoginBtn);

    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('errorMsg');

      if (!email || !password || !selectedRole) {
        errorEl.textContent = 'Please fill in all fields and select a console.';
        errorEl.style.display = 'block';
        return;
      }

      // Demo validation: check email contains role keyword
      const emailLower = email.toLowerCase();
      const isAdmin = emailLower.includes('admin');
      const isDispatcher = emailLower.includes('dispatch');

      if (selectedRole === 'admin' && !isAdmin) {
        errorEl.textContent = 'Access denied. Admin email required (e.g., admin@talion.io).';
        errorEl.style.display = 'block';
        return;
      }

      if (selectedRole === 'dispatcher' && !isDispatcher && !isAdmin) {
        errorEl.textContent = 'Access denied. Dispatcher email required (e.g., dispatch@talion.io).';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';

      // Redirect to appropriate console
      if (selectedRole === 'admin') {
        window.location.href = '/admin-console/';
      } else {
        window.location.href = '/dispatch-v2/';
      }
    }

    function quickAccess(role) {
      if (role === 'admin') {
        window.location.href = '/admin-console/';
      } else {
        window.location.href = '/dispatch-v2/';
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !document.getElementById('loginBtn').disabled) {
        handleLogin();
      }
    });
  </script>
</body>
</html>
